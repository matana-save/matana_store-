  <style>
   :root{
     --bg:#F5F5F5;
     --panel:#E8E8E8;
     --card:#E8E8E8;
     --text:#333333;
     --muted:#000000;
     --gold:#D4AF37;
     --line:rgba(0,0,0,0.1);
     --slideshow-bg:#E8E8E8;
   }
   *{box-sizing:border-box}
   body{margin:0;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text)}
   .container{max-width:1200px;margin:auto;padding:20px}
   header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
   .brand{font-size:1.0rem;font-weight:400;color:var(--gold)}
   input{padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);width:200px}
   .btn{padding:5px 10px;border-radius:7px;border:none;cursor:pointer;font-weight:700;margin:2px}
   .btn-gold{background:var(--gold);color:#000}
   .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
   
   .hero{
     padding:40px 20px;
     text-align:center;
     background:var(--panel);
     border:1px solid var(--line);
     border-radius:20px;
     margin:20px 0;
     box-shadow:0 2px 8px rgba(0,0,0,0.05);
   }
   
   .hero h2{
     color:var(--gold);
     font-size:1.0rem;
     margin:0 0 8px;
   }
   
   .slideshow-container{
     position:relative;
     margin:20px 0;
     overflow:hidden;
     border-radius:20px;
   }
   .slide{
     display:none;
     width:100%;
     animation:fade 1.5s;
   }
   .slide img{
     width:100%;
     border-radius:20px;
   }
   @keyframes fade{
     from{opacity:0.4}
     to{opacity:1}
   }
   
   .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:20px 0}
   .card,.product-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
   .price{color:var(--gold);font-weight:600;font-size:1.3rem}
   .meta{color:var(--muted);font-size:.9rem;margin:4px 0}
   .admin-panel{display:none;margin-top:20px;padding:20px;background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
   .admin-panel.open{display:block}
   .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
   .field{margin-bottom:10px}
   label{display:block;margin-bottom:5px;color:var(--muted)}
   input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text)}
   .admin-toggle{background:var(--card);border:1px solid var(--line);color:var(--gold);padding:8px 16px;border-radius:8px;cursor:pointer;margin:10px 0}
   .contact-section{margin:1px 0;padding:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
   .contact-section h2{color:var(--gold);margin:0 0 20px}
   .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
   .contact-btn{padding:0;border:0;background:transparent;border-radius:7px;color:var(--gold);text-decoration:none;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:0;transition:.3s}
   .contact-btn:hover{background:var(--gold);color:#FFFFFF;transform:translateY(-5px)}
   .contact-btn svg{width:20px;height:20px;fill:currentColor}
   
   input[type="radio"]{
     appearance:none;
     -webkit-appearance:none;
     width:8px;
     height:8px;
     border:1px solid #D4AF37;
     border-radius:50%;
     display:inline-block;
     position:relative;
     cursor:pointer;
     margin-left:6px;
     vertical-align:middle;
   }
   
   input[type="radio"]:checked{
     background:#D4AF30;
     box-shadow:inset 0 0 0 4px #fff;
   }
   
   .order-btn{
     display:block;
     text-align:center;

     width:50px;
     height:30px;
     line-height:30px;
     padding:0;

   .order-btn:hover{

     cursor:grab;
   }
   
   .product-image-box img{
     width:88%;
     height:88%;
     object-fit:contain;
     transform:scale(1.03);
     transition:.3s ease;
   }

   .hero-card{

     border-radius:20px;

   .hero-card__content{

   .contact-section{

      const img = document.getElementById('img_' + cardId);
      if (!img) return;
      img.src = src;
      img.className = 'product-main-image';
      const imageName = src.split('/').pop().replace('.jpg', '');
      img.classList.add('img-' + imageName);
      selectedImages[cardId] = src;
    }

    function bindSwipe(cardId) {
      const box = document.getElementById('imgbox_' + cardId);
      const product = products.find(p => p.cardId === cardId);
      if (!box || !product) return;

      const images = product.images || product.sizes.map(s => s.image).filter(Boolean);
      if (!images.length) return;

      box.style.touchAction = 'pan-y';

      const getCurrentIndex = () => {
        const current = selectedImages[cardId] || product.image || images[0];
        let idx = images.indexOf(current);
        if (idx === -1) idx = 0;
        return idx;
      };

      const move = (dir) => {
        let idx = getCurrentIndex();
        idx = dir === 'left' ? (idx + 1) % images.length : (idx - 1 + images.length) % images.length;
        setCardImage(cardId, images[idx]);
      };

      box.addEventListener('touchstart', (e) => {
        touchState[cardId] = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });

      box.addEventListener('touchend', (e) => {
        const start = touchState[cardId];
        if (!start) return;
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const diffX = endX - start.x;
        const diffY = endY - start.y;
        if (Math.abs(diffX) > 40 && Math.abs(diffY) < 80) {
          move(diffX < 0 ? 'left' : 'right');
        }
        touchState[cardId] = null;
      }, { passive: true });

      box.addEventListener('mousedown', (e) => {
        touchState[cardId] = { x: e.clientX, y: e.clientY };
      });

      box.addEventListener('mouseup', (e) => {
        const start = touchState[cardId];
        if (!start) return;
        const diffX = e.clientX - start.x;
        const diffY = e.clientY - start.y;
        if (Math.abs(diffX) > 40 && Math.abs(diffY) < 80) {
          move(diffX < 0 ? 'left' : 'right');
        }
        touchState[cardId] = null;
      });
    }

    function getCurrentPrice(product, item, cardId) {
      const keyType = selectedKeys[cardId] || 'Key ';
      return keyType === 'Digital' || keyType === 'Key+Digital'
        ? item.priceDigital
        : item.priceKey;
    }

    function renderSlideshow() {
      const container = document.getElementById('slideshowContainer');
      if (!container) return;
      container.innerHTML = `
        <div class="slide"><img class="slide-1" src="images/10.jpg" alt=""></div>
        <div class="slide"><img class="slide-2" src="images/11.jpg" alt=""></div>
        <div class="slide"><img class="slide-3" src="images/12.jpg" alt=""></div>
      `;
      startSlideshow();
    }

    function startSlideshow() {
      let slideIndex = 0;
      const slidesEl = document.getElementsByClassName('slide');
      if (slidesEl.length > 0) {
        slidesEl[0].style.display = 'block';
        setInterval(() => {
          slidesEl[slideIndex].style.display = 'none';
          slideIndex = (slideIndex + 1) % slidesEl.length;
          slidesEl[slideIndex].style.display = 'block';
        }, 3000);
      }
    }

    function renderProducts() {
      const box = document.getElementById('products');
      if (!box) return;
      let html = '';

      products.forEach((p) => {
        const defaultPrice = getCurrentPrice(p, p.sizes[0], p.cardId);

        html += `
        <div class="card" id="card_${p.cardId}">
          <div id="imgbox_${p.cardId}" class="product-image-box">
            <img id="img_${p.cardId}" src="${p.image}" alt="${p.name}">
          </div>

          ${[1,2].includes(p.cardId) ? `
          <div class="thumbs-side">
            <img src="${p.image}" onclick="setCardImage(${p.cardId}, '${p.image}')">
            ${p.sizes.map(s => `
              <img src="${s.image}" onclick="setCardImage(${p.cardId}, '${s.image}')">
            `).join('')}
          </div>
          ` : ''}

          ${[4,5,6,7].includes(p.cardId) ? `
          <div class="thumbs-side">
            <img src="${p.images[0]}" onclick="setCardImage(${p.cardId}, '${p.images[0]}')">
            <img src="${p.images[1]}" onclick="setCardImage(${p.cardId}, '${p.images[1]}')">
          </div>
          ` : ''}

          ${p.cardId === 3 ? `
          <div class="thumbs-3">
            <img id="thumb_3_1" src="${p.images[0]}" onclick="setCardImage(${p.cardId}, '${p.images[0]}')">
            <img id="thumb_3_2" src="${p.images[1]}" onclick="setCardImage(${p.cardId}, '${p.images[1]}')">
            <img id="thumb_3_3" src="${p.images[2]}" onclick="setCardImage(${p.cardId}, '${p.images[2]}')">
          </div>
          ` : ''}

          <h3 style="margin:0 0 10px">${p.name}</h3>

          <div class="meta">
            <div><b>الموديل:</b> <span id="size_text_${p.cardId}">${p.sizes[0].label}</span></div>
            <div><b>القفل:</b> <span id="lock_text_${p.cardId}">${p.lock || ''}</span></div>

            ${p.cardId === 2 ? `
            <div><b>الطول:</b> <span id="length_text_${p.cardId}">${p.sizes[0].length || ''}</span></div>
            <div><b>العرض:</b> <span id="width_text_${p.cardId}">${p.sizes[0].width || ''}</span></div>
            <div><b>العمق:</b> <span id="depth_text_${p.cardId}">${p.sizes[0].depth || ''}</span></div>
            ` : p.cardId === 4 ? `
            <div><b>الوزن:</b> <span id="weight_text_${p.cardId}">${p.sizes[0].weight || ''}</span></div>
            <div><b>السعة:</b> <span id="capacity_text_${p.cardId}">${p.sizes[0].capacity || ''}</span></div>
            ` : p.cardId === 5 || p.cardId === 6 ? `
            <div><b>الوزن:</b> <span id="weight_text_${p.cardId}">${p.sizes[0].weight || ''}</span></div>
            <div><b>السعة:</b> <span id="capacity_text_${p.cardId}">${p.sizes[0].capacity || ''}</span></div>
            ` : `
            <div><b>الوزن:</b> <span id="weight_text_${p.cardId}">${p.sizes[0].weight || ''}</span></div>
            `}
          </div>

          <div class="card-content">
            ${(p.cardId === 3 || p.cardId === 4 || p.cardId === 5 || p.cardId === 6 || p.cardId === 7) ? `
            <div class="lock-section" style="margin:10px 0">
              <div style="font-weight:700;margin-bottom:6px;color:var(--gold)">نوع القفل</div>
              ${p.cardId === 3 ? `
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input type="radio" name="key_${p.cardId}" value="Key " checked onchange="updateKey(${p.cardId}, this.value)">
                  <span>2Key</span>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input type="radio" name="key_${p.cardId}" value="Key+Digital " onchange="updateKey(${p.cardId}, this.value)">
                  <span>Key+Digital</span>
                </label>
              </div>
              ` : `
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input type="radio" name="key_${p.cardId}" value="Key " checked onchange="updateKey(${p.cardId}, this.value)">
                  <span>2Key</span>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input type="radio" name="key_${p.cardId}" value="Digital " onchange="updateKey(${p.cardId}, this.value)">
                  <span>Digital</span>
                </label>
              </div>
              `}
            </div>
            ` : ''}

            <div class="size-section" style="margin:0 0 2px">
              <div class="model-title">الموديل</div>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                ${p.sizes.map((s, idx) => `
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;width:calc(33.33% - 7px)">
                  <input type="radio" name="size_${p.cardId}" value="${idx}" ${idx === 0 ? 'checked' : ''} onchange="updateCard(${p.cardId}, this.value)">
                  <span>${s.label}</span>
                </label>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="price" id="price_${p.cardId}">${formatPrice(defaultPrice)}</div>
          <a href="https://wa.me/966558687782" target="_blank" id="order_btn_${p.cardId}" class="order-btn">طلب</a>
        </div>
        `;
      });

      box.innerHTML = html;
      products.forEach(p => {
        bindSwipe(p.cardId);
        selectedKeys[p.cardId] = selectedKeys[p.cardId] || 'Key ';
        updateKey(p.cardId, selectedKeys[p.cardId]);
      });
    }

    function updateKey(cardId, keyType) {
      selectedKeys[cardId] = keyType;
      const product = products.find(p => p.cardId === cardId);
      if (!product) return;

      const selectedSize = document.querySelector(`input[name="size_${cardId}"]:checked`);
      if (!selectedSize) return;

      const item = product.sizes[Number(selectedSize.value)];
      if (!item) return;

      const finalPrice = (keyType === 'Digital ' || keyType === 'Key+Digital ')
        ? item.priceDigital
        : item.priceKey;

      const priceEl = document.getElementById('price_' + cardId);
      if (priceEl) priceEl.textContent = formatPrice(finalPrice);

      const btn = document.getElementById('order_btn_' + cardId);
      if (btn) {
        const msg = `أرغب في طلب: ${product.name}
المقاس: ${item.label}
نوع القفل: ${keyType}
السعر: ${formatPrice(finalPrice)}`;
        btn.href = `https://wa.me/966558687782?text=${encodeURIComponent(msg)}`;
      }
    }

    function updateCard(cardId, index) {
      const product = products.find(p => p.cardId === cardId);
      if (!product) return;

      const item = product.sizes[Number(index)];
      if (!item) return;

      document.getElementById('size_text_' + cardId).textContent = item.label;

      const newImage = item.image || product.image;
      const img = document.getElementById('img_' + cardId);
      if (img) img.src = newImage;
      selectedImages[cardId] = newImage;

      const keyType = selectedKeys[cardId] || 'Key ';
      const finalPrice = (keyType === 'Digital ' || keyType === 'Key+Digital ')
        ? item.priceDigital
        : item.priceKey;

      const priceEl = document.getElementById('price_' + cardId);
      if (priceEl) priceEl.textContent = formatPrice(finalPrice);

      const btn = document.getElementById('order_btn_' + cardId);
      if (btn) {
        const msg = `أرغب في طلب: ${product.name}
المقاس: ${item.label}
نوع القفل: ${keyType}
السعر: ${formatPrice(finalPrice)}`;
        btn.href = `https://wa.me/966558687782?text=${encodeURIComponent(msg)}`;
      }

      if (cardId === 2) {
        document.getElementById('length_text_' + cardId).textContent = item.length || '';
        document.getElementById('width_text_' + cardId).textContent = item.width || '';
        document.getElementById('depth_text_' + cardId).textContent = item.depth || '';
      } else if ([4, 5, 6].includes(cardId)) {
        document.getElementById('weight_text_' + cardId).textContent = item.weight || '';
        document.getElementById('capacity_text_' + cardId).textContent = item.capacity || '';
      } else {
        document.getElementById('weight_text_' + cardId).textContent = item.weight || '';
      }

      if (cardId === 3 && product.images && product.images[Number(index)]) {
        setCardImage(cardId, product.images[Number(index) % product.images.length]);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
      renderSlideshow();
    });
  </script>
</body>
</html>
